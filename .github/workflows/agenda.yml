name: Mise à jour agenda (DATAtourisme)

on:
  schedule:
    - cron: '23 0 * * *'      # tous les jours à 00:23 UTC (02:23 été / 01:23 hiver) - tôt + minute non ronde pour maximiser la marge avant 7h locale
  workflow_dispatch:           # déclenchement manuel possible

permissions:
  contents: write

concurrency:
  group: agenda
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Télécharger et décompresser le flux DATAtourisme
        env:
          DATATOURISME_URL: ${{ secrets.DATATOURISME_URL }}
        run: |
          set -e
          if [ -z "$DATATOURISME_URL" ]; then
            echo "::error::Le secret DATATOURISME_URL n'est pas défini."
            exit 1
          fi
          curl -sSL "$DATATOURISME_URL" -o flux.bin
          # Le flux peut être encore en génération (réponse JSON ~144 octets) : on stoppe proprement.
          if [ "$(stat -c%s flux.bin)" -lt 10000 ]; then
            echo "::warning::Flux indisponible ou trop petit (génération en cours ?). Voir le contenu :"
            cat flux.bin || true
            exit 1
          fi
          gzip -dc flux.bin > flux.zip
          mkdir -p extracted
          unzip -q -o flux.zip -d extracted

      - name: Construire data/agenda.json
        run: node scripts/build-agenda.js extracted data/agenda.json 20

      - name: Compléter les traductions manquantes (DeepL)
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: node scripts/translate-agenda.js data/agenda.json data/agenda-i18n-cache.json

      - name: Commit si l'agenda a changé
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/agenda.json data/agenda-i18n-cache.json
          if git diff --cached --quiet; then
            echo "Aucun changement dans l'agenda."
          else
            git commit -m "chore(agenda): mise à jour automatique des événements"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "Push tentative $i rejetée, nouvelle tentative…"; sleep 5
            done
          fi
