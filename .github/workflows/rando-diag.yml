name: Diagnostic flux itinéraires (temporaire)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Télécharger et décompresser le flux itinéraires
        env:
          DATATOURISME_URL: ${{ secrets.DATATOURISME_URL }}
        run: |
          set -e
          if [ -z "$DATATOURISME_URL" ]; then
            echo "::error::Le secret DATATOURISME_URL n'est pas défini."
            exit 1
          fi
          # Réutilise la clé d'application du flux agenda (dernier segment de l'URL)
          APPKEY="${DATATOURISME_URL##*/}"
          RANDO_URL="https://diffuseur.datatourisme.fr/webservice/321695b3b7feb0343a3f00ca8355dd0f/$APPKEY"
          curl -sSL "$RANDO_URL" -o flux.bin
          sz=$(stat -c%s flux.bin)
          echo "Taille téléchargée : $sz octets"
          if [ "$sz" -lt 10000 ]; then
            echo "::warning::Flux indisponible ou trop petit (génération en cours ?). Contenu :"
            cat flux.bin || true
            exit 1
          fi
          gzip -dc flux.bin > flux.zip
          mkdir -p extracted
          unzip -q -o flux.zip -d extracted

      - name: Diagnostic du flux
        run: node scripts/diag-rando.js extracted
