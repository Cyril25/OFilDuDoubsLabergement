    <script>
        // =============================================
        // PERSISTANCE (Cloudflare Worker KV + fallback localStorage)
        // =============================================

        // URL du Worker Cloudflare pour l'état partagé.
        // Mettre à jour après déploiement du worker (voir workers/menage-state-worker.js)
        const STATE_API_URL = 'https://menage-state.cyril-samson41.workers.dev/';

        const STORAGE_KEY = 'ofildudoubs_menage_state';

        // Cache mémoire de l'état (évite les lectures répétées)
        let cachedState = null;
        // Indique si l'état a été chargé depuis le serveur (vs fallback localStorage)
        // Empêche le localStorage obsolète d'écraser les données du serveur
        let serverLoaded = false;

        // Charge l'état depuis le serveur distant, avec fallback localStorage
        async function loadStateFromServer() {
            try {
                const response = await fetch(STATE_API_URL);
                if (!response.ok) throw new Error('API indisponible');
                const state = await response.json();
                // Synchronise le localStorage comme cache de secours
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
                cachedState = state;
                serverLoaded = true;
                return state;
            } catch (e) {
                console.warn('Fallback localStorage:', e.message);
                serverLoaded = false;
                return loadStateLocal();
            }
        }

        function loadStateLocal() {
            try {
                const state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
                cachedState = state;
                return state;
            } catch (e) {
                cachedState = {};
                return {};
            }
        }

        // Sauvegarde l'état sur le serveur distant + localStorage
        // Ne sauvegarde sur le serveur QUE si on a chargé depuis le serveur,
        // pour éviter que le localStorage obsolète n'écrase les données distantes.
        async function saveStateToServer(state) {
            cachedState = state;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            if (!serverLoaded) {
                console.warn('État non chargé depuis le serveur → sauvegarde locale uniquement');
                return;
            }
            try {
                await fetch(STATE_API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(state),
                });
            } catch (e) {
                console.warn('Sauvegarde distante échouée (localStorage OK):', e.message);
            }
        }

        // Accès synchrone à l'état en cache (pour le rendu)
        function getState() {
            return cachedState || {};
        }

        // Génère un identifiant unique pour un créneau basé sur ses dates.
        // Si le iCal change (nouvelle résa insérée), les fingerprints changent
        // => les anciens statuts "fait" ne s'appliquent plus => diff automatique.
        function slotFingerprint(slot) {
            const startDate = new Date(slot.start).toISOString().split('T')[0];
            const endDate = new Date(slot.end).toISOString().split('T')[0];
            return `slot_${startDate}_${endDate}`;
        }

        // Liste des prestataires
        const CLEANERS = ['Fanny & Lolita', 'Fanny', 'Lolita', 'Nathalie', 'Autre'];

        async function toggleSlotStatus(fingerprint, slot, doneBy) {
            const state = getState();
            const current = state[fingerprint];
            const isDone = current && current.status === 'done';

            state[fingerprint] = {
                status: isDone ? 'todo' : 'done',
                updatedAt: new Date().toISOString(),
                doneBy: isDone ? '' : (doneBy || ''),
                startDate: new Date(slot.start).toISOString().split('T')[0],
                endDate: new Date(slot.end).toISOString().split('T')[0]
            };

            await saveStateToServer(state);
            return state[fingerprint].status;
        }

        function getSlotStatus(fingerprint) {
            const state = getState();
            return (state[fingerprint] && state[fingerprint].status) || 'todo';
        }

        function getSlotDoneDate(fingerprint) {
            const state = getState();
            if (state[fingerprint] && state[fingerprint].status === 'done' && state[fingerprint].updatedAt) {
                return new Date(state[fingerprint].updatedAt).toLocaleDateString('fr-FR');
            }
            return null;
        }

        function getSlotDoneBy(fingerprint) {
            const state = getState();
            return (state[fingerprint] && state[fingerprint].doneBy) || '';
        }

        // =============================================
        // UTILITAIRES DE DATE
        // =============================================
        function getLocalISODate(date = new Date()) {
            const year = date.getFullYear();
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const day = date.getDate().toString().padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        const todayISO = getLocalISODate();

        // Dates manuelles et exclusions (A mettre à jour ici si besoin)
        const allManualCleaningDates = ['2024-11-01', '2025-12-29', '2026-02-19'];
        const allExcludedCleaningDates = ['2024-10-30', '2025-12-27'];

        const manualCleaningDates = allManualCleaningDates.filter(date => date >= todayISO);
        const excludedCleaningDates = allExcludedCleaningDates.filter(date => date >= todayISO);

        // =============================================
        // INITIALISATION
        // =============================================
        $('#calendar').fullCalendar({
            locale: 'fr',
            height: 'auto',
            events: []
        });

        // Variable globale pour permettre le refresh du calendrier
        let currentCleaningSlots = [];

        // Chargement parallèle : état distant + flux iCal
        async function init() {
            const [_, icalResponse] = await Promise.all([
                loadStateFromServer(),
                fetch('https://airbnb-ical-proxy.cyril-samson41.workers.dev/')
            ]);

            const icalData = await icalResponse.text();
            const events = parseICS(icalData);
            currentCleaningSlots = calculateCleaningSlots(events);

            // Enregistre les fingerprints actuels pour la détection de changements
            await markCurrentSlots(currentCleaningSlots);

            updateCalendar(currentCleaningSlots);
            updateCleaningSlotsList(currentCleaningSlots);
            updatePastSlotsList();
        }

        init().catch(error => console.error('Erreur initialisation:', error));

        // Enregistre les créneaux actuels dans le state (sans écraser le statut)
        async function markCurrentSlots(slots) {
            const state = getState();
            let changed = false;
            for (const slot of slots) {
                const fp = slotFingerprint(slot);
                if (!state[fp]) {
                    state[fp] = {
                        status: 'todo',
                        updatedAt: new Date().toISOString(),
                        startDate: new Date(slot.start).toISOString().split('T')[0],
                        endDate: new Date(slot.end).toISOString().split('T')[0]
                    };
                    changed = true;
                }
            }
            if (changed) await saveStateToServer(state);
        }

        // =============================================
        // PARSING iCAL
        // =============================================
        function parseICS(icsData) {
            const events = [];
            const eventPattern = /BEGIN:VEVENT[\s\S]+?END:VEVENT/g;
            const eventsRaw = icsData.match(eventPattern);
            const today = new Date();
            const sixMonthsLater = new Date();
            sixMonthsLater.setMonth(today.getMonth() + 6);

            // Dernier départ connu (pour calculer le 1er créneau sans utiliser "now")
            let lastPastCheckout = null;

            if (eventsRaw) {
                eventsRaw.forEach(event => {
                    const datePatternStart = /DTSTART;VALUE=DATE:(\d{8})/;
                    const datePatternEnd = /DTEND;VALUE=DATE:(\d{8})/;
                    const summaryPattern = /SUMMARY:(.*)/;
                    const startDate = event.match(datePatternStart);
                    const endDate = event.match(datePatternEnd);
                    const summaryMatch = event.match(summaryPattern);
                    const summary = summaryMatch ? summaryMatch[1].trim() : '';

                    if (startDate && endDate) {
                        const start = new Date(formatDate(startDate[1]));
                        const end = new Date(formatDate(endDate[1]));

                        if (start > sixMonthsLater) return;

                        // Blocs "Not available" : DTEND est exclusif (convention iCal)
                        // → le checkout réel est DTEND - 1 jour
                        const isNotAvailable = summary.includes('Not available');
                        const effectiveEnd = isNotAvailable
                            ? new Date(end.getTime() - 24 * 60 * 60 * 1000)
                            : end;
                        const effectiveEndStr = isNotAvailable
                            ? addDaysToISODate(formatDate(endDate[1]), -1)
                            : formatDate(endDate[1]);

                        // Événement passé : on garde la date de départ la plus récente
                        if (effectiveEnd < today) {
                            const checkoutISO = effectiveEndStr + 'T11:00:00';
                            if (!lastPastCheckout || checkoutISO > lastPastCheckout) {
                                lastPastCheckout = checkoutISO;
                            }
                            return;
                        }

                        events.push({
                            start: formatDate(startDate[1]) + 'T17:00:00',
                            end: effectiveEndStr + 'T11:00:00'
                        });
                    }
                });
                events.sort((a, b) => new Date(a.start) - new Date(b.start));

                // Persister lastPastCheckout dans le KV pour survivre à la suppression
                // des événements passés par Airbnb
                if (lastPastCheckout) {
                    // On a trouvé un checkout dans le iCal → le sauvegarder
                    // Seulement si plus récent que la valeur existante (ne jamais reculer)
                    const st = getState();
                    if (!st._lastCheckout || lastPastCheckout > st._lastCheckout) {
                        st._lastCheckout = lastPastCheckout;
                        saveStateToServer(st);
                    }
                } else {
                    // Airbnb a supprimé les événements passés → récupérer depuis le KV
                    const st = getState();
                    if (st._lastCheckout) {
                        lastPastCheckout = st._lastCheckout;
                    }
                }

                if (events.length > 0) {
                    const first = events[0];
                    const firstStart = new Date(first.start);
                    const now = new Date();
                    if (now < firstStart) {
                        // Utiliser le dernier départ connu au lieu de "now"
                        // → fingerprint stable, indépendant du moment de chargement
                        const slotStart = lastPastCheckout
                            ? new Date(lastPastCheckout)
                            : now;

                        if (slotStart < firstStart) {
                            events._preFirstCleaningSlot = {
                                start: slotStart.toISOString(),
                                end: firstStart.toISOString(),
                                title: "Créneau ménage",
                                displayText: "Créneau ménage"
                            };
                        }
                    }
                }
            }
            return events;
        }

        // =============================================
        // CALCUL DES CRÉNEAUX
        // =============================================
        function calculateCleaningSlots(events) {
            let initialSlots = [];
            if (events._preFirstCleaningSlot) initialSlots.push(events._preFirstCleaningSlot);

            for (let i = 0; i < events.length - 1; i++) {
                const currentEventEnd = new Date(events[i].end);
                const nextEventStart = new Date(events[i + 1].start);
                if (currentEventEnd < nextEventStart) {
                    initialSlots.push({
                        title: `Créneau ménage`,
                        start: currentEventEnd.toISOString(),
                        end: nextEventStart.toISOString(),
                        displayText: `Créneau ménage`
                    });
                }
            }

            const allowedCleaningDays = new Set();
            const dayTimeMap = new Map();

            for (const slot of initialSlots) {
                const datesInSlot = enumerateDatesInRange(slot.start, slot.end);
                const startDate = new Date(slot.start).toISOString().split('T')[0];
                const endDate = new Date(slot.end).toISOString().split('T')[0];

                for (const date of datesInSlot) {
                    allowedCleaningDays.add(date);
                    if (date === startDate) {
                        let times = dayTimeMap.get(date) || { start: null, end: null };
                        times.start = slot.start;
                        dayTimeMap.set(date, times);
                    }
                    if (date === endDate) {
                        let times = dayTimeMap.get(date) || { start: null, end: null };
                        times.end = slot.end;
                        dayTimeMap.set(date, times);
                    }
                }
            }

            for (const excludeDate of excludedCleaningDates) allowedCleaningDays.delete(excludeDate);
            for (const manualDate of manualCleaningDates) {
                allowedCleaningDays.add(manualDate);
                if (!dayTimeMap.has(manualDate)) {
                    dayTimeMap.set(manualDate, {
                        start: new Date(manualDate + 'T11:00:00Z').toISOString(),
                        end: new Date(manualDate + 'T17:00:00Z').toISOString()
                    });
                }
            }

            if (allowedCleaningDays.size === 0) return [];

            const sortedDates = Array.from(allowedCleaningDays).sort();
            const finalSlots = [];
            let currentSlot = null;

            for (const date of sortedDates) {
                const expectedNextDate = currentSlot ? addDaysToISODate(currentSlot._endDateOnly, 1) : null;
                if (currentSlot && date === expectedNextDate) {
                    const endTime = (dayTimeMap.get(date) && dayTimeMap.get(date).end) ? dayTimeMap.get(date).end : new Date(date + 'T17:00:00Z').toISOString();
                    currentSlot.end = endTime;
                    currentSlot._endDateOnly = date;
                } else {
                    if (currentSlot) finalSlots.push(currentSlot);
                    const startTime = (dayTimeMap.get(date) && dayTimeMap.get(date).start) ? dayTimeMap.get(date).start : new Date(date + 'T11:00:00Z').toISOString();
                    const endTime = (dayTimeMap.get(date) && dayTimeMap.get(date).end) ? dayTimeMap.get(date).end : new Date(date + 'T17:00:00Z').toISOString();
                    currentSlot = {
                        title: 'Créneau ménage',
                        start: startTime,
                        end: endTime,
                        displayText: 'Créneau ménage',
                        _startDateOnly: date,
                        _endDateOnly: date
                    };
                }
            }
            if (currentSlot) finalSlots.push(currentSlot);
            return finalSlots;
        }

        // =============================================
        // MISE À JOUR DU CALENDRIER
        // =============================================
        function updateCalendar(cleaningSlots) {
            $('#calendar').fullCalendar('removeEventSources');
            $('#calendar').fullCalendar('addEventSource', cleaningSlots.map(slot => {
                const slotStart = new Date(slot.start);
                const slotEnd = new Date(slot.end);
                const isSameDay = slotStart.toDateString() === slotEnd.toDateString();
                const isWeekendSlot = slotStart.getDay() === 6 && slotStart.getHours() >= 11 && slotEnd.getDay() === 0 && slotEnd.getHours() <= 17 && slotStart.toDateString() !== slotEnd.toDateString();

                const fp = slotFingerprint(slot);
                const status = getSlotStatus(fp);
                const isDone = status === 'done';

                let className;
                if (isDone) {
                    className = 'slot-done';
                } else if (isSameDay) {
                    className = 'same-day';
                } else if (isWeekendSlot) {
                    className = 'weekend-slot';
                } else {
                    className = 'standard-slot';
                }

                return {
                    ...slot,
                    title: isDone ? 'Ménage fait' : slot.title,
                    className: className
                };
            }));
        }

        // =============================================
        // MISE À JOUR DE LA LISTE
        // =============================================
        function updateCleaningSlotsList(cleaningSlots) {
            const listElement = document.getElementById('cleaning-slots');
            if (!listElement) return;
            listElement.innerHTML = '';

            let todoCount = 0;
            let doneCount = 0;

            cleaningSlots.forEach((slot, idx) => {
                const fp = slotFingerprint(slot);
                const status = getSlotStatus(fp);
                const isDone = status === 'done';
                if (isDone) doneCount++;
                else todoCount++;

                const listItem = document.createElement('li');
                const slotStart = new Date(slot.start);
                const slotEnd = new Date(slot.end);
                const now = new Date();

                // Classe de type de créneau
                if (slotStart.toDateString() === slotEnd.toDateString()) {
                    listItem.classList.add('urgent');
                } else if (slotStart.getDay() === 6 && slotStart.getHours() >= 11 && slotEnd.getDay() === 0 && slotEnd.getHours() <= 17 && slotStart.toDateString() !== slotEnd.toDateString()) {
                    listItem.classList.add('weekend');
                }

                // Classe de statut
                if (isDone) {
                    listItem.classList.add('done');
                }

                // Texte du créneau
                const textSpan = document.createElement('span');
                textSpan.className = 'slot-text';

                if (slotStart.toDateString() === slotEnd.toDateString()) {
                    textSpan.innerHTML = `Le ${slotStart.toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })} entre 11h et 17h`;
                } else {
                    textSpan.innerHTML = `Entre ${slotStart.toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })} 11h et ${slotEnd.toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })} 17h`;
                }

                listItem.appendChild(textSpan);

                // Le créneau est-il actionnable ? (date de début passée)
                const slotStarted = slotStart <= now;

                if (isDone) {
                    // Afficher la date de validation + qui + bouton annuler
                    const doneDate = getSlotDoneDate(fp);
                    const doneBy = getSlotDoneBy(fp);
                    const doneInfo = document.createElement('span');
                    doneInfo.className = 'done-info';
                    const byText = doneBy ? ` par ${doneBy}` : '';
                    doneInfo.innerHTML = `<i class="fas fa-check-circle"></i> Fait le ${doneDate}${byText}`;
                    listItem.appendChild(doneInfo);

                    const btnUndo = document.createElement('button');
                    btnUndo.className = 'btn-status is-done';
                    btnUndo.innerHTML = '<i class="fas fa-undo"></i> Annuler';
                    btnUndo.addEventListener('click', async function() {
                        btnUndo.disabled = true;
                        btnUndo.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                        await toggleSlotStatus(fp, slot, '');
                        updateCleaningSlotsList(currentCleaningSlots);
                        updateCalendar(currentCleaningSlots);
                        updatePastSlotsList();
                    });
                    listItem.appendChild(btnUndo);
                } else if (slotStarted) {
                    // Créneau en cours ou passé : select + bouton Valider
                    const actions = document.createElement('div');
                    actions.className = 'slot-actions';

                    const select = document.createElement('select');
                    select.className = 'select-cleaner';
                    select.innerHTML = '<option value="">Qui ?</option>' +
                        CLEANERS.map(c => `<option value="${c}">${c}</option>`).join('');
                    // Pré-sélectionner "Fanny & Lolita"
                    select.value = 'Fanny & Lolita';
                    actions.appendChild(select);

                    const btn = document.createElement('button');
                    btn.className = 'btn-status todo';
                    btn.innerHTML = '<i class="fas fa-broom"></i> Valider';
                    btn.addEventListener('click', async function() {
                        btn.disabled = true;
                        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                        await toggleSlotStatus(fp, slot, select.value);
                        updateCleaningSlotsList(currentCleaningSlots);
                        updateCalendar(currentCleaningSlots);
                        updatePastSlotsList();
                    });
                    actions.appendChild(btn);
                    listItem.appendChild(actions);
                } else {
                    // Créneau futur : pas encore actionnable
                    const badge = document.createElement('span');
                    badge.className = 'badge-future';
                    badge.innerHTML = '<i class="fas fa-clock"></i> À venir';
                    listItem.appendChild(badge);
                }
                listElement.appendChild(listItem);
            });

            // Mise à jour du résumé
            const summary = document.getElementById('status-summary');
            if (summary) {
                if (cleaningSlots.length === 0) {
                    summary.innerHTML = 'Aucun créneau de ménage à venir.';
                } else {
                    summary.innerHTML = `<strong>${todoCount} à faire</strong> · <span class="done-count">${doneCount} effectué(s)</span> · ${cleaningSlots.length} total`;
                }
            }
        }

        // =============================================
        // CRÉNEAUX PASSÉS (historique en lecture seule)
        // =============================================

        // Toggle affichage/masquage
        document.getElementById('past-slots-toggle').addEventListener('click', function() {
            const content = document.getElementById('past-slots-content');
            const isHidden = content.style.display === 'none';
            content.style.display = isHidden ? 'block' : 'none';
            this.classList.toggle('collapsed', !isHidden);
        });

        function updatePastSlotsList() {
            const tbody = document.getElementById('past-slots-body');
            if (!tbody) return;
            tbody.innerHTML = '';

            const state = getState();
            const now = new Date();
            const todayStr = getLocalISODate(now);

            // Collecter les créneaux passés depuis le state
            // Un créneau est "passé" si sa date de fin est avant aujourd'hui
            // ET qu'il n'est plus dans les slots actifs du iCal
            const activeFingerprints = new Set(currentCleaningSlots.map(s => slotFingerprint(s)));

            const pastEntries = Object.entries(state)
                .filter(([key, entry]) => {
                    if (!key.startsWith('slot_')) return false;
                    // Passé = date de fin avant aujourd'hui OU n'existe plus dans les slots actifs et marqué done
                    return entry.endDate && entry.endDate < todayStr;
                })
                .sort((a, b) => b[1].endDate.localeCompare(a[1].endDate)); // Plus récent en premier

            if (pastEntries.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="past-empty">Aucun historique pour le moment.</td></tr>';
                return;
            }

            for (const [key, entry] of pastEntries) {
                const tr = document.createElement('tr');

                // Créneau
                const tdSlot = document.createElement('td');
                const start = new Date(entry.startDate + 'T12:00:00');
                const end = new Date(entry.endDate + 'T12:00:00');
                if (start.toDateString() === end.toDateString()) {
                    tdSlot.textContent = start.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
                } else {
                    tdSlot.textContent = `${start.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' })} - ${end.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' })}`;
                }
                tr.appendChild(tdSlot);

                // Statut
                const tdStatus = document.createElement('td');
                if (entry.status === 'done') {
                    tdStatus.innerHTML = '<span class="status-done"><i class="fas fa-check-circle"></i> Fait</span>';
                } else {
                    tdStatus.innerHTML = '<span class="status-missed"><i class="fas fa-times-circle"></i> Non renseigné</span>';
                }
                tr.appendChild(tdStatus);

                // Fait par
                const tdBy = document.createElement('td');
                tdBy.textContent = entry.doneBy || '-';
                tr.appendChild(tdBy);

                // Date validation
                const tdDate = document.createElement('td');
                if (entry.status === 'done' && entry.updatedAt) {
                    tdDate.textContent = new Date(entry.updatedAt).toLocaleDateString('fr-FR');
                } else {
                    tdDate.textContent = '-';
                }
                tr.appendChild(tdDate);

                tbody.appendChild(tr);
            }
        }

        // =============================================
        // UTILITAIRES
        // =============================================
        function formatDate(dateString) {
            const year = dateString.substring(0, 4);
            const month = dateString.substring(4, 6);
            const day = dateString.substring(6, 8);
            return `${year}-${month}-${day}`;
        }

        function addDaysToISODate(isoDate, days) {
            const date = new Date(isoDate);
            date.setUTCDate(date.getUTCDate() + days);
            return date.toISOString().split('T')[0];
        }

        function enumerateDatesInRange(startISOString, endISOString) {
            const dates = new Set();
            let currentISO = new Date(startISOString).toISOString().split('T')[0];
            const endDate = new Date(endISOString).toISOString().split('T')[0];
            const endObj = new Date(endDate);
            while (new Date(currentISO) <= endObj) {
                dates.add(currentISO);
                currentISO = addDaysToISODate(currentISO, 1);
            }
            return Array.from(dates);
        }
    </script>
